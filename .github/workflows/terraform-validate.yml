name: Terraform Validate & Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.7.0'

jobs:
  fmt-validate:
    name: Terraform Fmt & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format (auto-fix)
        run: terraform fmt -recursive

      - name: Check formatting diff
        run: |
          if ! git diff --exit-code; then
            echo "::warning::Terraform files were reformatted. Review the diff above."
          fi

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Commit auto-formatted files
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: terraform fmt"
          file_pattern: "terraform/**/*.tf"

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Init TFLint plugins
        run: tflint --init --config "${{ github.workspace }}/.tflint.hcl"

      - name: Run TFLint
        run: tflint --recursive
        working-directory: terraform
