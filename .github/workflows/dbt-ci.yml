name: dbt CI

on:
  pull_request:
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-ci.yml'

jobs:
  dbt-compile-test:
    name: dbt Parse & Deps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-databricks
        run: pip install dbt-databricks

      - name: Generate profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          databricks_medallion:
            target: dev
            outputs:
              dev:
                type: databricks
                catalog: main
                schema: default
                host: localhost
                http_path: /sql/1.0/warehouses/abc123
                token: dapi-fake
                threads: 1
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt parse
        working-directory: dbt
        timeout-minutes: 2
        run: dbt parse
