name: dbt CI

on:
  pull_request:
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-ci.yml'

jobs:
  dbt-validate:
    name: dbt Compile & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-databricks
        run: pip install dbt-databricks

      - name: Generate profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          databricks_medallion:
            target: ci
            outputs:
              ci:
                type: databricks
                catalog: main
                schema: dbt_ci_${GITHUB_RUN_ID}
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4
                session_properties:
                  ANSI_MODE: true
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        timeout-minutes: 5
        run: dbt compile --target ci
