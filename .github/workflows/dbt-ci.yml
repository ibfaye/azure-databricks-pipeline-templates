name: dbt CI

on:
  pull_request:
    paths:
      - 'dbt/**'
  push:
    branches:
      - main
    paths:
      - 'dbt/**'

jobs:
  dbt-compile-test:
    name: dbt Compile & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-databricks
        run: pip install dbt-databricks

      - name: Create profiles.yml in default location
        run: |
          mkdir -p ~/.dbt
          cp dbt/profiles.yml.example ~/.dbt/profiles.yml

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile
        working-directory: dbt
        run: dbt compile --target dev
