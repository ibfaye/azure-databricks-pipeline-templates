version: 2

sources:
  - name: landing_sales
    description: "Raw sales transactions from POS/ERP"
    database: "{{ var('bronze_catalog', 'bronze') }}"
    schema: sales
    tables:
      - name: raw_sales_transactions
        description: "Raw sales transactions"
        columns:
          - name: transaction_id
            tests: [not_null]
          - name: amount
          - name: currency
          - name: customer_email
          - name: transaction_date

  - name: landing_customers
    description: "Raw customer profiles from CRM"
    database: "{{ var('bronze_catalog', 'bronze') }}"
    schema: customers
    tables:
      - name: raw_customer_profiles
        description: "Customer master data"
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: email
          - name: full_name
          - name: registration_date

  - name: landing_inventory
    description: "Raw inventory movements from WMS"
    database: "{{ var('bronze_catalog', 'bronze') }}"
    schema: operations
    tables:
      - name: raw_inventory_movements
        description: "Warehouse movements"
        columns:
          - name: movement_id
            tests: [not_null, unique]
          - name: product_sku
          - name: quantity
          - name: movement_type

  - name: landing_web
    description: "Raw web events"
    database: "{{ var('bronze_catalog', 'bronze') }}"
    schema: customers
    tables:
      - name: raw_web_events
        description: "Clickstream and web events"
        columns:
          - name: event_id
            tests: [not_null]
          - name: session_id
          - name: user_id
          - name: event_type
          - name: event_timestamp

  - name: landing_iot
    description: "Raw IoT sensor readings"
    database: "{{ var('bronze_catalog', 'bronze') }}"
    schema: iot
    tables:
      - name: raw_iot_sensor_readings
        description: "Sensor telemetry"
        columns:
          - name: device_id
            tests: [not_null]
          - name: sensor_type
          - name: reading_value
          - name: reading_timestamp

models:
  - name: stg_sales_transactions
    description: "Staging: raw sales transactions with audit columns"
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: amount
        tests:
          - not_null
      - name: transaction_date
        tests:
          - not_null
  - name: stg_customer_profiles
    description: "Staging: raw customer profiles"
  - name: stg_inventory_movements
    description: "Staging: raw inventory movements"
  - name: stg_web_events
    description: "Staging: raw web event data"
  - name: stg_iot_readings
    description: "Staging: raw IoT sensor readings"
